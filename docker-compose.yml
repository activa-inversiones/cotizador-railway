version: '3.4'
services:
  frappe:
    image: frappe/erpnext:v15
    restart: always
    environment:
      - DB_HOST=mariadb
      - REDIS_CACHE=redis-cache:6379
      - REDIS_QUEUE=redis-queue:6379
      - REDIS_SOCKETIO=redis-socketio:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    ports:
      - "8000:8000"
    depends_on:
      - mariadb
      - redis-cache
      - redis-queue
      - redis-socketio

  mariadb:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: activa123
    volumes:
      - db:/var/lib/mysql
    ports:
      - "3306:3306"

  redis-cache:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-cache:/data

  redis-queue:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-queue:/data

  redis-socketio:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-socketio:/data

volumes:
  sites:
  db:
  redis-cache:
  redis-queue:
  redis-socketio:
